<?xml version="1.0" encoding="UTF-8"?>
<!--
  LokShift footer eclipse — full SVG asset.
  Brand-blue translation of the Voxr "contact-us-decor" reference:
  · Orb lit from the bottom (radial gradient anchored at 50% 100%)
  · Bright white-blue rim where light wraps the lower curve
  · Body fades to page-color (#040714) at the top
  · Flat elliptical reflection beneath the orb
  · Wide soft halo behind everything for ambient bleed
  · Two decorative question marks flanking the upper area

  Used as a background image, so it scales 100% width without artifacts.
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1200 900"
  preserveAspectRatio="xMidYMid meet"
  width="100%"
  height="100%"
  aria-hidden="true"
>
  <defs>
    <!-- ORB gradient — light originates at bottom-center, fades to dark at top -->
    <radialGradient id="orb-fill" cx="50%" cy="98%" r="60%" fx="50%" fy="98%">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.95" />
      <stop offset="4%"  stop-color="#D6E9FF" stop-opacity="0.92" />
      <stop offset="9%"  stop-color="#9CC8FF" stop-opacity="0.85" />
      <stop offset="16%" stop-color="#4DA3FF" stop-opacity="0.75" />
      <stop offset="28%" stop-color="#0064E0" stop-opacity="0.45" />
      <stop offset="42%" stop-color="#0050B3" stop-opacity="0.20" />
      <stop offset="60%" stop-color="#040714" stop-opacity="0.05" />
      <stop offset="80%" stop-color="#040714" stop-opacity="0" />
    </radialGradient>

    <!-- HALO gradient — same shape as orb but softer + reaches further -->
    <radialGradient id="orb-halo" cx="50%" cy="92%" r="70%" fx="50%" fy="92%">
      <stop offset="0%"  stop-color="#9CC8FF" stop-opacity="0.55" />
      <stop offset="20%" stop-color="#4DA3FF" stop-opacity="0.35" />
      <stop offset="40%" stop-color="#0064E0" stop-opacity="0.18" />
      <stop offset="65%" stop-color="#0050B3" stop-opacity="0.06" />
      <stop offset="85%" stop-color="#040714" stop-opacity="0" />
    </radialGradient>

    <!-- REFLECTION gradient — flat ellipse below the orb -->
    <radialGradient id="reflection-fill" cx="50%" cy="0%" r="55%" fx="50%" fy="0%">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.55" />
      <stop offset="6%"  stop-color="#9CC8FF" stop-opacity="0.55" />
      <stop offset="18%" stop-color="#4DA3FF" stop-opacity="0.45" />
      <stop offset="38%" stop-color="#0064E0" stop-opacity="0.22" />
      <stop offset="60%" stop-color="#0050B3" stop-opacity="0.08" />
      <stop offset="85%" stop-color="#040714" stop-opacity="0" />
    </radialGradient>

    <!-- WIDE outer reflection halo — even softer + wider than the main reflection -->
    <radialGradient id="reflection-halo" cx="50%" cy="0%" r="65%" fx="50%" fy="0%">
      <stop offset="0%"  stop-color="#4DA3FF" stop-opacity="0.30" />
      <stop offset="25%" stop-color="#0064E0" stop-opacity="0.18" />
      <stop offset="55%" stop-color="#0050B3" stop-opacity="0.06" />
      <stop offset="80%" stop-color="#040714" stop-opacity="0" />
    </radialGradient>

    <!-- Soft Gaussian blur filter for the orb (edges look diffuse, not vector-sharp) -->
    <filter id="soft-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" />
    </filter>

    <!-- Heavier blur for halo + outer washes -->
    <filter id="heavy-blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="22" />
    </filter>
  </defs>

  <!-- Solid page-color base -->
  <rect width="1200" height="900" fill="#040714" />

  <!-- Wide ambient halo behind everything (subtle bleed) -->
  <circle cx="600" cy="430" r="540" fill="url(#orb-halo)" filter="url(#heavy-blur)" opacity="0.85" />

  <!-- The ORB — full circle, lit from below -->
  <circle cx="600" cy="380" r="270" fill="url(#orb-fill)" filter="url(#soft-blur)" />

  <!-- Inner extra-bright crescent at the very bottom of the orb (sharp accent) -->
  <ellipse cx="600" cy="640" rx="220" ry="22" fill="#FFFFFF" opacity="0.35" filter="url(#soft-blur)" />
  <ellipse cx="600" cy="642" rx="180" ry="14" fill="#9CC8FF" opacity="0.55" filter="url(#soft-blur)" />

  <!-- WIDE reflection halo (back layer) -->
  <ellipse cx="600" cy="760" rx="450" ry="70" fill="url(#reflection-halo)" filter="url(#heavy-blur)" opacity="0.85" />

  <!-- Main reflection ellipse (front layer) -->
  <ellipse cx="600" cy="760" rx="320" ry="38" fill="url(#reflection-fill)" filter="url(#soft-blur)" />

  <!-- Question marks (decorative, low-opacity) -->
  <g fill="#FFFFFF" opacity="0.07" font-family="Georgia, 'Times New Roman', serif" font-weight="700">
    <text x="160" y="180" font-size="140" transform="rotate(-12 160 180)">?</text>
    <text x="1040" y="200" font-size="140" transform="rotate(12 1040 200)" text-anchor="end">?</text>
  </g>
</svg>
